<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS | Works</title>
    <link rel="stylesheet" href="works.css">
    <link rel="shortcut icon" href="./photos/css_favicon.svg" type="image/svg+xml">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
</head>
<body>

<div class="boss">  
<div class="underboss">
  <header class="caporegime">
   <div class="logo_div">
    <a href="../main/main.html">
     <model-viewer class="logo3d" 
      src="./models/css_logo.glb" 
      alt="css_logo" 
      auto-rotate 
      interaction-prompt="none"
      shadow-intensity="2"
      rotation-per-second="25deg">
     </model-viewer>
    </a>
  </div>
  </header>
 <main class="main">
  <div class="card1">
   <model-viewer class="model1" 
    src="./models/css_logo.glb" 
    alt="css_logo" 
    auto-rotate 
    interaction-prompt="none"
    shadow-intensity="2"
    rotation-per-second="20deg">
   </model-viewer>
  </div>
  <div class="card2">
   <model-viewer class="model2" 
    src="./models/knife.glb" 
    alt="knife_logo" 
    auto-rotate 
    interaction-prompt="none"
    shadow-intensity="2"
    rotation-per-second="20deg">
   </model-viewer>
  </div>
  <div class="card3">
   <model-viewer class="model3" 
    src="./models/google_logo.glb" 
    alt="google_logo" 
    auto-rotate 
    interaction-prompt="none"
    shadow-intensity="2"
    rotation-per-second="20deg">
   </model-viewer>
  </div>
  <div class="card4">
   <model-viewer class="model4" 
    src="./models/ak_logo.glb" 
    alt="ak47_logo" 
    auto-rotate 
    interaction-prompt="none"
    shadow-intensity="2"
    rotation-per-second="20deg">
   </model-viewer>
  </div>
  <div class="enforcer">
  <img class="enforcer_photo" src="./photos/boss_cat.jpg" alt="kitten_is_your_boss">
  </div>
  <div class="small5">
   <img class="photo5" src="./photos/china.jpg" alt="china">
  </div>
  <div class="small6">
   <img class="photo6" src="./photos/las vegas.jpg" alt="las_vegas">
  </div>
  <div class="small7">
   <img class="photo7" src="./photos/dubai.jpg" alt="dubai">
  </div>
  <div class="small8">
   <img class="photo8" src="./photos/new york.jpg" alt="new_york">
  </div>
 </main>
 <main class="second_main"></main>
</div>
</div>

</body>
</html>
